<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Don Rafael's Coffee</title>

  <link href="https://fonts.googleapis.com/css2?family=Lobster&display=swap" rel="stylesheet">

  <style>

    /* ===== BACKGROUND (NEW PREMIUM FEEL) ===== */
    body {
      margin: 0;
      font-family: Arial, sans-serif;

      /* soft café-style gradient */
      background: linear-gradient(
        180deg,
        #ffffff 0%,
        #fff9f7 100%
      );

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    /* ===== TOP CTA ===== */
    .quote-button {
      position: fixed;
      top: 25px;
      right: 25px;

      background-color: #4EA5D9;
      color: white;
      text-decoration: none;

      padding: 12px 22px;
      border-radius: 12px;

      font-weight: 700;
      font-size: 14px;

      box-shadow: 0 6px 18px rgba(0,0,0,.12);
      transition: all 0.25s ease;
    }

    .quote-button:hover {
      background-color: #2f8cc5;
      transform: translateY(-3px);
    }

    /* ===== CENTER CONTENT ===== */
    .container {
      max-width: 720px;
      padding: 20px;
    }

    h1 {
      font-family: "Lobster", cursive;
      font-size: 78px;
      color: #c1121f;
      margin: 0;
      letter-spacing: 0.5px;
    }

    /* tagline upgraded spacing */
    .tagline {
      font-size: 21px;
      color: #222;
      margin-top: 12px;
      margin-bottom: 6px;
      font-weight: 500;
    }

    /* subline becomes service positioning */
    .subline {
      font-size: 14px;
      color: #777;
      margin-bottom: 34px;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    /* ===== PRIMARY CTA ===== */
    .cta-button {
      display: inline-block;

      padding: 14px 30px;
      background-color: #c1121f;
      color: white;

      text-decoration: none;
      font-size: 16px;
      border-radius: 12px;

      font-weight: 700;

      transition: all 0.25s ease;
      box-shadow: 0 6px 18px rgba(193,18,31,0.18);
    }

    .cta-button:hover {
      background-color: #a50f19;
      transform: translateY(-3px);
    }

    /* ===== MOBILE ===== */
    @media (max-width: 768px) {
      h1 {
        font-size: 56px;
      }

      .quote-button {
        top: 15px;
        right: 15px;
        padding: 10px 16px;
      }

      .tagline {
        font-size: 18px;
      }
    }

  </style>
</head>

<body>

  <!-- TOP RIGHT CTA -->
  <a
    class="quote-button"
    href="https://app.flashquotes.com/f/nusxmt"
    target="_blank"
  >
    Get Your Custom Quote
  </a>

  <div class="container">

    <h1>Don Rafael's</h1>

    <div class="tagline">South Florida's Puerto Rican Coffee</div>

    <div class="subline">Pop-Ups • Catering • Community</div>

    <a
      class="cta-button"
      href="https://instagram.com/donrafaelscoffee"
      target="_blank"
    >
      Cafecito y la Familia!
    </a>

  </div>

</body>
</html>
